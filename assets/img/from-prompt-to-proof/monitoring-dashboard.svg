<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">Anonymized local-first monitoring dashboard</title>
  <desc id="desc">A synthetic dashboard reconstruction showing KPIs, a seven-day trend, an evidence trail, and validation checks.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f2e7"/>
      <stop offset="1" stop-color="#eef3eb"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#184f3b"/>
      <stop offset="1" stop-color="#65a46f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#173b2e" flood-opacity=".10"/>
    </filter>
  </defs>

  <rect width="1440" height="900" rx="32" fill="url(#bg)"/>
  <rect x="42" y="38" width="1356" height="824" rx="24" fill="#fffdf8" stroke="#d8dfd5" filter="url(#shadow)"/>

  <rect x="42" y="38" width="1356" height="92" rx="24" fill="#173f31"/>
  <rect x="42" y="106" width="1356" height="24" fill="#173f31"/>
  <circle cx="90" cy="84" r="18" fill="#c8dd6c"/>
  <path d="M82 84h16M90 76v16" stroke="#173f31" stroke-width="3" stroke-linecap="round"/>
  <text x="124" y="76" fill="#f9fbf7" font-family="Arial, sans-serif" font-size="22" font-weight="700">Local-first monitoring dashboard</text>
  <text x="124" y="101" fill="#b8cec2" font-family="Arial, sans-serif" font-size="14">CASE NOTE A · ANONYMIZED RECONSTRUCTION</text>
  <rect x="1126" y="64" width="226" height="40" rx="20" fill="#244f40" stroke="#4f7868"/>
  <circle cx="1151" cy="84" r="5" fill="#c8dd6c"/>
  <text x="1167" y="90" fill="#e8f2ec" font-family="Arial, sans-serif" font-size="14">Synthetic values only</text>

  <text x="80" y="172" fill="#6f776f" font-family="Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="1.4">WEEKLY DECISION VIEW</text>
  <text x="80" y="207" fill="#1d2d26" font-family="Georgia, serif" font-size="29">What changed, what is missing, and what needs review?</text>

  <g font-family="Arial, sans-serif">
    <g transform="translate(80 238)">
      <rect width="246" height="132" rx="17" fill="#eff5ee" stroke="#d8e5d8"/>
      <text x="22" y="31" fill="#68756b" font-size="13">COMPLETION</text>
      <text x="22" y="79" fill="#174b38" font-size="38" font-weight="700">78%</text>
      <text x="22" y="107" fill="#47715c" font-size="13">+6 pts vs prior window</text>
      <path d="M181 89a28 28 0 1 1 19-49" fill="none" stroke="#d5dfd4" stroke-width="8"/>
      <path d="M200 40a28 28 0 0 1-19 49" fill="none" stroke="#6da56f" stroke-width="8" stroke-linecap="round"/>
    </g>
    <g transform="translate(342 238)">
      <rect width="246" height="132" rx="17" fill="#f7f4e9" stroke="#e8e0c8"/>
      <text x="22" y="31" fill="#746f60" font-size="13">7-DAY AVERAGE</text>
      <text x="22" y="79" fill="#3b3d31" font-size="38" font-weight="700">6.4</text>
      <text x="22" y="107" fill="#786f50" font-size="13">Unit defined in metric catalog</text>
      <rect x="175" y="35" width="43" height="58" rx="8" fill="#ece4c5"/>
      <path d="M185 75l8-12 7 5 9-19" fill="none" stroke="#a27b2f" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g transform="translate(604 238)">
      <rect width="246" height="132" rx="17" fill="#faf1e9" stroke="#eed8c8"/>
      <text x="22" y="31" fill="#7b6d63" font-size="13">MISSING DAYS</text>
      <text x="22" y="79" fill="#7c4827" font-size="38" font-weight="700">2</text>
      <text x="22" y="107" fill="#8c6349" font-size="13">Shown, never converted to zero</text>
      <circle cx="198" cy="64" r="25" fill="#f2d8c7"/>
      <path d="M198 48v19M198 77v2" stroke="#9b4b22" stroke-width="4" stroke-linecap="round"/>
    </g>
    <g transform="translate(866 238)">
      <rect width="246" height="132" rx="17" fill="#eef3f5" stroke="#d5e1e5"/>
      <text x="22" y="31" fill="#66757b" font-size="13">REVIEW FLAGS</text>
      <text x="22" y="79" fill="#315766" font-size="38" font-weight="700">1</text>
      <text x="22" y="107" fill="#5d7781" font-size="13">Rule version v1.3</text>
      <path d="M181 39h35v39h-35z" fill="#d8e8ed"/>
      <path d="M188 49h20M188 58h16M188 67h11" stroke="#416977" stroke-width="3" stroke-linecap="round"/>
    </g>
  </g>

  <g transform="translate(80 402)">
    <rect width="842" height="286" rx="18" fill="#ffffff" stroke="#dce2da"/>
    <text x="24" y="34" fill="#26362f" font-family="Arial, sans-serif" font-size="17" font-weight="700">Observed trend</text>
    <text x="24" y="57" fill="#768079" font-family="Arial, sans-serif" font-size="12">Daily grain · seven-day window · missingness preserved</text>
    <line x1="58" y1="91" x2="802" y2="91" stroke="#e5e9e4"/>
    <line x1="58" y1="139" x2="802" y2="139" stroke="#e5e9e4"/>
    <line x1="58" y1="187" x2="802" y2="187" stroke="#e5e9e4"/>
    <line x1="58" y1="235" x2="802" y2="235" stroke="#e5e9e4"/>
    <line x1="58" y1="153" x2="802" y2="153" stroke="#c38a58" stroke-width="2" stroke-dasharray="7 8"/>
    <text x="683" y="145" fill="#9b6338" font-family="Arial, sans-serif" font-size="11">review threshold</text>
    <path d="M64 213 C115 207 139 179 181 184 S251 160 294 169 S358 125 408 137" fill="none" stroke="url(#line)" stroke-width="6" stroke-linecap="round"/>
    <path d="M408 137 L486 123 M584 139 C631 152 670 112 717 117 S768 100 800 96" fill="none" stroke="url(#line)" stroke-width="6" stroke-linecap="round"/>
    <g fill="#fff" stroke="#2e7653" stroke-width="4">
      <circle cx="64" cy="213" r="6"/><circle cx="181" cy="184" r="6"/><circle cx="294" cy="169" r="6"/><circle cx="408" cy="137" r="6"/><circle cx="486" cy="123" r="6"/><circle cx="584" cy="139" r="6"/><circle cx="717" cy="117" r="6"/><circle cx="800" cy="96" r="6"/>
    </g>
    <rect x="503" y="102" width="64" height="44" rx="10" fill="#fff7ef" stroke="#d7a77e" stroke-dasharray="4 4"/>
    <text x="516" y="129" fill="#96613b" font-family="Arial, sans-serif" font-size="12">missing</text>
    <g fill="#77817a" font-family="Arial, sans-serif" font-size="11">
      <text x="54" y="261">D1</text><text x="171" y="261">D2</text><text x="285" y="261">D3</text><text x="398" y="261">D4</text><text x="472" y="261">D5</text><text x="526" y="261">D6</text><text x="707" y="261">D7</text>
    </g>
  </g>

  <g transform="translate(944 402)" font-family="Arial, sans-serif">
    <rect width="408" height="286" rx="18" fill="#173f31"/>
    <text x="24" y="35" fill="#f4f7f3" font-size="17" font-weight="700">Evidence trail</text>
    <text x="24" y="58" fill="#a9c3b7" font-size="12">Every summary can be traced backwards</text>
    <g transform="translate(24 82)">
      <rect width="360" height="43" rx="10" fill="#234f3f"/>
      <circle cx="22" cy="21" r="11" fill="#c8dd6c"/><text x="18" y="26" fill="#173f31" font-size="13" font-weight="700">1</text>
      <text x="44" y="18" fill="#f0f5f1" font-size="13" font-weight="700">Raw event log</text><text x="44" y="34" fill="#a9c3b7" font-size="11">64 synthetic records · local storage</text>
      <path d="M180 43v13" stroke="#6e9684" stroke-width="2"/>
    </g>
    <g transform="translate(24 138)">
      <rect width="360" height="43" rx="10" fill="#234f3f"/>
      <circle cx="22" cy="21" r="11" fill="#c8dd6c"/><text x="18" y="26" fill="#173f31" font-size="13" font-weight="700">2</text>
      <text x="44" y="18" fill="#f0f5f1" font-size="13" font-weight="700">Validated transformation</text><text x="44" y="34" fill="#a9c3b7" font-size="11">types · dates · duplicates · missingness</text>
      <path d="M180 43v13" stroke="#6e9684" stroke-width="2"/>
    </g>
    <g transform="translate(24 194)">
      <rect width="360" height="43" rx="10" fill="#234f3f"/>
      <circle cx="22" cy="21" r="11" fill="#c8dd6c"/><text x="18" y="26" fill="#173f31" font-size="13" font-weight="700">3</text>
      <text x="44" y="18" fill="#f0f5f1" font-size="13" font-weight="700">KPI + supporting rows</text><text x="44" y="34" fill="#a9c3b7" font-size="11">definition v1.3 · source records available</text>
    </g>
  </g>

  <g transform="translate(80 714)" font-family="Arial, sans-serif">
    <rect width="1272" height="106" rx="16" fill="#f1f4ef" stroke="#d9e0d7"/>
    <text x="23" y="30" fill="#33443b" font-size="13" font-weight="700" letter-spacing="1">VALIDATION LOG</text>
    <g transform="translate(23 48)" font-size="13">
      <circle cx="10" cy="10" r="10" fill="#5d9667"/><path d="M5 10l3 3 6-7" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><text x="29" y="15" fill="#526057">date boundaries</text>
      <circle cx="205" cy="10" r="10" fill="#5d9667"/><path d="M200 10l3 3 6-7" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><text x="224" y="15" fill="#526057">zero denominators</text>
      <circle cx="425" cy="10" r="10" fill="#5d9667"/><path d="M420 10l3 3 6-7" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><text x="444" y="15" fill="#526057">missing days</text>
      <circle cx="605" cy="10" r="10" fill="#5d9667"/><path d="M600 10l3 3 6-7" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><text x="624" y="15" fill="#526057">export / import</text>
      <circle cx="805" cy="10" r="10" fill="#5d9667"/><path d="M800 10l3 3 6-7" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><text x="824" y="15" fill="#526057">combined filters</text>
      <rect x="1016" y="-4" width="205" height="30" rx="15" fill="#fff" stroke="#d4ddd3"/><text x="1043" y="16" fill="#66736b" font-size="12">8 automated checks passed</text>
    </g>
