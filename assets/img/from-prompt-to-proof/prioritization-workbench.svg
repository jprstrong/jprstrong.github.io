<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">Anonymized AI-assisted prioritization workspace</title>
  <desc id="desc">A synthetic reconstruction showing evidence inputs, schema validation, transparent scoring, and an action recommendation.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4f0e8"/>
      <stop offset="1" stop-color="#eceff5"/>
    </linearGradient>
    <linearGradient id="score" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d9b45d"/>
      <stop offset="1" stop-color="#7967b3"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#252039" flood-opacity=".10"/>
    </filter>
  </defs>

  <rect width="1440" height="900" rx="32" fill="url(#bg2)"/>
  <rect x="42" y="38" width="1356" height="824" rx="24" fill="#fffdf9" stroke="#dedbe4" filter="url(#shadow2)"/>

  <rect x="42" y="38" width="1356" height="92" rx="24" fill="#28243b"/>
  <rect x="42" y="106" width="1356" height="24" fill="#28243b"/>
  <rect x="72" y="65" width="38" height="38" rx="10" fill="#e0bb63"/>
  <path d="M82 78h18M82 88h12" stroke="#28243b" stroke-width="3" stroke-linecap="round"/>
  <text x="128" y="76" fill="#faf8fd" font-family="Arial, sans-serif" font-size="22" font-weight="700">AI-assisted prioritization workspace</text>
  <text x="128" y="101" fill="#c5bed8" font-family="Arial, sans-serif" font-size="14">CASE NOTE B · ANONYMIZED RECONSTRUCTION</text>
  <rect x="1126" y="64" width="226" height="40" rx="20" fill="#37314f" stroke="#5e567b"/>
  <circle cx="1151" cy="84" r="5" fill="#e0bb63"/>
  <text x="1167" y="90" fill="#eeeaf6" font-family="Arial, sans-serif" font-size="14">Synthetic values only</text>

  <text x="80" y="172" fill="#756f7d" font-family="Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="1.4">FROM AMBIGUOUS INPUT TO EXPLAINABLE ACTION</text>
  <text x="80" y="207" fill="#292634" font-family="Georgia, serif" font-size="29">Separate model interpretation from the decision rule.</text>

  <g font-family="Arial, sans-serif">
    <g transform="translate(80 242)">
      <rect width="358" height="448" rx="18" fill="#faf8f3" stroke="#e4dfd6"/>
      <text x="22" y="34" fill="#36323a" font-size="17" font-weight="700">1 · Evidence inbox</text>
      <text x="22" y="57" fill="#817b82" font-size="12">Unstructured descriptions become reviewable inputs</text>
      <g transform="translate(22 84)">
        <rect width="314" height="85" rx="13" fill="#fff" stroke="#ddd7ce"/>
        <rect x="15" y="16" width="52" height="52" rx="10" fill="#e7ded0"/>
        <path d="M25 53l12-14 9 9 10-17" fill="none" stroke="#9b8467" stroke-width="3"/>
        <text x="84" y="30" fill="#333039" font-size="14" font-weight="700">Candidate A</text>
        <text x="84" y="51" fill="#807a81" font-size="12">3 notes · 2 evidence items</text>
        <rect x="84" y="61" width="88" height="16" rx="8" fill="#eef0e8"/><text x="96" y="73" fill="#66705d" font-size="10">ready to review</text>
      </g>
      <g transform="translate(22 181)">
        <rect width="314" height="85" rx="13" fill="#fff" stroke="#ddd7ce"/>
        <rect x="15" y="16" width="52" height="52" rx="10" fill="#deddeb"/>
        <path d="M25 53l12-10 9 4 10-19" fill="none" stroke="#77709a" stroke-width="3"/>
        <text x="84" y="30" fill="#333039" font-size="14" font-weight="700">Candidate B</text>
        <text x="84" y="51" fill="#807a81" font-size="12">2 notes · 1 evidence item</text>
        <rect x="84" y="61" width="108" height="16" rx="8" fill="#fff0dc"/><text x="96" y="73" fill="#986f34" font-size="10">missing one field</text>
      </g>
      <g transform="translate(22 278)">
        <rect width="314" height="85" rx="13" fill="#fff" stroke="#ddd7ce"/>
        <rect x="15" y="16" width="52" height="52" rx="10" fill="#dce8e4"/>
        <path d="M25 53l12-18 9 13 10-10" fill="none" stroke="#5f8a7a" stroke-width="3"/>
        <text x="84" y="30" fill="#333039" font-size="14" font-weight="700">Candidate C</text>
        <text x="84" y="51" fill="#807a81" font-size="12">4 notes · 3 evidence items</text>
        <rect x="84" y="61" width="88" height="16" rx="8" fill="#eef0e8"/><text x="96" y="73" fill="#66705d" font-size="10">ready to review</text>
      </g>
      <rect x="22" y="385" width="314" height="40" rx="12" fill="#302b43"/>
      <text x="99" y="411" fill="#f8f6fb" font-size="13" font-weight="700">Analyze selected evidence →</text>
    </g>

    <g transform="translate(462 242)">
      <rect width="428" height="448" rx="18" fill="#ffffff" stroke="#dedbe5"/>
      <text x="22" y="34" fill="#36323a" font-size="17" font-weight="700">2 · Structured interpretation</text>
      <text x="22" y="57" fill="#817b82" font-size="12">Model output must pass a typed schema</text>
      <rect x="22" y="82" width="384" height="50" rx="12" fill="#f1f5ef" stroke="#d9e3d5"/>
      <circle cx="47" cy="107" r="11" fill="#5f916a"/>
      <path d="M42 107l3 3 6-7" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="67" y="105" fill="#3f6047" font-size="13" font-weight="700">Schema validated</text>
      <text x="67" y="121" fill="#6e7e71" font-size="11">required fields · enums · confidence bounds</text>

      <text x="22" y="164" fill="#68626d" font-size="12" font-weight="700">EVIDENCE FIT</text>
      <rect x="22" y="176" width="304" height="13" rx="7" fill="#eeeaf0"/><rect x="22" y="176" width="249" height="13" rx="7" fill="url(#score)"/>
      <text x="344" y="188" fill="#433b5c" font-size="16" font-weight="700">82</text>
      <text x="22" y="225" fill="#68626d" font-size="12" font-weight="700">FEASIBILITY</text>
      <rect x="22" y="237" width="304" height="13" rx="7" fill="#eeeaf0"/><rect x="22" y="237" width="216" height="13" rx="7" fill="#8b7aba"/>
      <text x="344" y="249" fill="#433b5c" font-size="16" font-weight="700">71</text>
      <text x="22" y="286" fill="#68626d" font-size="12" font-weight="700">RISK</text>
      <rect x="22" y="298" width="304" height="13" rx="7" fill="#eeeaf0"/><rect x="22" y="298" width="91" height="13" rx="7" fill="#d99c6a"/>
      <text x="344" y="310" fill="#7b4e2c" font-size="15" font-weight="700">LOW</text>

      <rect x="22" y="341" width="384" height="83" rx="13" fill="#f8f6f0" stroke="#e7e1d4"/>
      <text x="38" y="365" fill="#6c665d" font-size="11" font-weight="700">MODEL-PROPOSED SUMMARY</text>
      <text x="38" y="388" fill="#39363b" font-size="13">Strong evidence alignment; two assumptions</text>
      <text x="38" y="407" fill="#39363b" font-size="13">require human confirmation before scoring.</text>
    </g>

    <g transform="translate(914 242)">
      <rect width="438" height="448" rx="18" fill="#2c2840"/>
      <text x="22" y="34" fill="#fbf9ff" font-size="17" font-weight="700">3 · Decision + next action</text>
      <text x="22" y="57" fill="#bfb8d1" font-size="12">Deterministic score applied after validation</text>
      <rect x="22" y="84" width="394" height="106" rx="16" fill="#37314f" stroke="#5d5478"/>
      <text x="41" y="111" fill="#bfb8d1" font-size="11" font-weight="700">RECOMMENDATION</text>
      <text x="41" y="157" fill="#e3bd66" font-size="38" font-weight="700">EXPLORE</text>
      <rect x="284" y="113" width="106" height="43" rx="21" fill="#ece7f5"/><text x="314" y="140" fill="#44395f" font-size="18" font-weight="700">76 / 100</text>

      <text x="22" y="224" fill="#bfb8d1" font-size="11" font-weight="700">REASON CODES</text>
      <rect x="22" y="239" width="176" height="33" rx="16" fill="#46405b"/><text x="41" y="260" fill="#eeeaf7" font-size="12">evidence strength</text>
      <rect x="208" y="239" width="153" height="33" rx="16" fill="#46405b"/><text x="227" y="260" fill="#eeeaf7" font-size="12">feasible scope</text>
      <rect x="22" y="282" width="159" height="33" rx="16" fill="#46405b"/><text x="41" y="303" fill="#eeeaf7" font-size="12">bounded risk</text>

      <text x="22" y="351" fill="#bfb8d1" font-size="11" font-weight="700">NEXT ACTION</text>
      <rect x="22" y="366" width="394" height="58" rx="13" fill="#e1bb63"/>
      <text x="42" y="392" fill="#2c2840" font-size="13" font-weight="700">Confirm two assumptions with a reviewer</text>
      <text x="42" y="410" fill="#584a2d" font-size="11">then generate an evidence-backed action brief</text>
    </g>
  </g>

  <g transform="translate(80 716)" font-family="Arial, sans-serif">
    <rect width="1272" height="104" rx="16" fill="#f3f1f6" stroke="#ddd9e5"/>
    <text x="23" y="29" fill="#47424d" font-size="13" font-weight="700" letter-spacing="1">GUARDRAILS THAT MAKE THE WORKFLOW TESTABLE</text>
    <g transform="translate(23 48)" font-size="13">
      <rect width="213" height="32" rx="16" fill="#fff" stroke="#ddd8e4"/><circle cx="18" cy="16" r="6" fill="#71649c"/><text x="33" y="21" fill="#635d68">provider contract</text>
      <rect x="229" width="213" height="32" rx="16" fill="#fff" stroke="#ddd8e4"/><circle cx="247" cy="16" r="6" fill="#71649c"/><text x="262" y="21" fill="#635d68">schema validation</text>
      <rect x="458" width="213" height="32" rx="16" fill="#fff" stroke="#ddd8e4"/><circle cx="476" cy="16" r="6" fill="#71649c"/><text x="491" y="21" fill="#635d68">scoring unit tests</text>
      <rect x="687" width="213" height="32" rx="16" fill="#fff" stroke="#ddd8e4"/><circle cx="705" cy="16" r="6" fill="#71649c"/><text x="720" y="21" fill="#635d68">visible failure states</text>
      <rect x="916" width="327" height="32" rx="16" fill="#2c2840"/><text x="978" y="21" fill="#eeeaf7">model inference ≠ decision evidence</text>
    </g>
  </g>
</svg>
